# Documentation Build Workflow for lite-llm platform
# Builds cargo docs, checks for broken links, and deploys to GitHub Pages
# Triggered on docs/ and lite-llm-docs/ changes

name: Documentation

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "lite-llm-docs/**"
      - "**/README.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to GitHub Pages after build"
        type: boolean
        default: true

# Allow only one concurrent deployment, skip runs queued between the run in-progress and latest queued
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CRATES: "lite-llm-security lite-llm-distributed lite-llm-storage lite-llm-inference lite-llm-training lite-llm-runtime lite-llm"

jobs:
  # ─────────────────────────────────────────────
  # Build cargo documentation
  # ─────────────────────────────────────────────
  build-docs:
    name: Build Rust Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-docs-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-docs-registry-

      # Build documentation for all crates
      - name: Build cargo docs
        run: |
          echo "📚 Building documentation for all crates..."
          for crate in $CRATES; do
            echo "Building docs: $crate"
            cd "$crate"
            cargo doc --no-deps --all-features 2>&1 || echo "⚠️ Doc build failed for $crate (non-blocking)"
            cd ..
          done

      # Collect all doc outputs into a single directory
      - name: Collect documentation
        run: |
          mkdir -p docs-output
          
          # Copy cargo docs from each crate
          for crate in $CRATES; do
            if [ -d "$crate/target/doc" ]; then
              cp -r "$crate/target/doc" "docs-output/${crate}-doc"
              echo "✓ Copied docs for $crate"
            fi
          done

      - name: Upload cargo documentation
        uses: actions/upload-artifact@v4
        with:
          name: cargo-docs
          path: docs-output/
          retention-days: 14

  # ─────────────────────────────────────────────
  # Build and validate markdown documentation
  # ─────────────────────────────────────────────
  validate-docs:
    name: Validate Markdown Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Check for broken links in markdown documentation
      - name: Check for broken links
        uses: lycheeverse/lychee-action@v1
        with:
          args: >-
            --verbose
            --no-progress
            --exclude-loopback
            --exclude-mail
            './docs/**/*.md'
            './lite-llm-docs/**/*.md'
            './*.md'
            '**/README.md'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Validate markdown structure
      - name: Validate documentation structure
        run: |
          echo "📋 Checking documentation structure..."
          
          # Check for required documentation files
          REQUIRED_FILES=(
            "README.md"
            "docs/README.md"
            "lite-llm-docs/README.md"
          )
          
          for file in "${REQUIRED_FILES[@]}"; do
            if [ -f "$file" ]; then
              echo "✓ Found: $file"
            else
              echo "⚠️ Missing: $file"
            fi
          done

  # ─────────────────────────────────────────────
  # Deploy to GitHub Pages
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: [build-docs, validate-docs]
    if: ${{ github.event.inputs.deploy != 'false' && github.ref == 'refs/heads/main' }}
    
    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an appropriate source

    # Deploy to the github-pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Download cargo docs
      - name: Download cargo documentation
        uses: actions/download-artifact@v4
        with:
          name: cargo-docs
          path: site/cargo-docs/

      # Prepare static site structure
      - name: Prepare documentation site
        run: |
          echo "🌐 Preparing documentation site..."
          
          # Create site structure
          mkdir -p site
          
          # Copy cargo docs
          mkdir -p site/docs
          for crate in $CRATES; do
            if [ -d "site/cargo-docs/${crate}-doc" ]; then
              cp -r "site/cargo-docs/${crate}-doc" "site/docs/${crate}"
              echo "✓ Added docs for $crate"
            fi
          done
          
          # Copy existing docs directory if it has static site content
          if [ -d "docs" ]; then
            cp -r docs/* site/ 2>/dev/null || true
          fi
          
          # Create index page if it doesn't exist
          if [ ! -f "site/index.html" ]; then
            cat > site/index.html << 'EOF'
            <!DOCTYPE html>
            <html lang="en">
            <head>
                <meta charset="UTF-8">
                <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <title>lite-llm Documentation</title>
                <style>
                    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
                    h1 { color: #333; }
                    .crate-list { list-style: none; padding: 0; }
                    .crate-list li { padding: 10px 0; border-bottom: 1px solid #eee; }
                    .crate-list a { color: #0366d6; text-decoration: none; }
                    .crate-list a:hover { text-decoration: underline; }
                </style>
            </head>
            <body>
                <h1>📚 lite-llm Documentation</h1>
                <ul class="crate-list">
                    <li><a href="docs/lite-llm/index.html">lite-llm</a> — Main binary</li>
                    <li><a href="docs/lite-llm-runtime/index.html">lite-llm-runtime</a> — Core runtime</li>
                    <li><a href="docs/lite-llm-security/index.html">lite-llm-security</a> — Security controls</li>
                    <li><a href="docs/lite-llm-distributed/index.html">lite-llm-distributed</a> — Distributed systems</li>
                    <li><a href="docs/lite-llm-storage/index.html">lite-llm-storage</a> — Storage hierarchy</li>
                    <li><a href="docs/lite-llm-inference/index.html">lite-llm-inference</a> — Inference runtime</li>
                    <li><a href="docs/lite-llm-training/index.html">lite-llm-training</a> — Training runtime</li>
                </ul>
            </body>
            </html>
            EOF
          fi
          
          echo "✓ Documentation site prepared"

      # Setup GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # Upload site artifact
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      # Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
